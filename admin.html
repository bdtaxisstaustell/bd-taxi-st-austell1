<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; text-align:center; padding:40px; background:#eef2f7; }
button { padding:12px; width:80%; background:#4285F4; color:white; border:none; font-size:16px; border-radius:8px; }
</style>
</head>

<body>

<h2>🔐 Admin Login</h2>

<button onclick="login()">Login with Google</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
  storageBucket: "taxi-bookings-69cff.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then(()=>{
      window.location.href = "dashboard.html";
    })
    .catch(err=>{
      alert("Login failed: " + err.message);
    });
}
</script>

</body>
</html>
