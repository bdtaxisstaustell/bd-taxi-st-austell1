<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BD Taxi Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#eef2f7; }

.top {
  background:#0f172a;
  color:white;
  padding:12px;
}
.top h2 { margin:0; }

.tabs {
  display:flex;
  gap:6px;
  padding:10px;
}
.tabs button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}
.active { background:#0f172a; color:white; }

.card {
  background:white;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.actions button {
  margin:5px 5px 0 0;
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.accept{background:green;color:white;}
.reject{background:red;color:white;}
.done{background:#0ea5e9;color:white;}
.edit{background:#f59e0b;color:white;}
.fare{background:#111827;color:white;}
.secondary{background:#ddd;}
</style>
</head>

<body>

<div class="top">
  <h2>🚕 BD Taxi Dashboard</h2>
  💰 £<span id="earn">0</span> |
  📦 <span id="count">0</span>
</div>

<div class="tabs">
  <button onclick="setTab('new')" id="tab-new" class="active">New</button>
  <button onclick="setTab('accepted')" id="tab-accepted">Accepted</button>
  <button onclick="setTab('done')" id="tab-done">Done</button>
</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q"
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let tab="new";
let all=[];

/* TAB */
function setTab(t){
  tab=t;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  render();
}

/* RENDER */
function render(){
  const container=document.getElementById("list");
  container.innerHTML="";

  let total=0,count=0;

  all.forEach(({id,d})=>{
    if((d.status||"new")!==tab) return;

    count++;
    const fare = parseFloat(d.fare)||0;
    if(d.status==="done") total+=fare;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${d.name||"No Name"}</b><br>
      📞 ${d.phone||"-"}<br>
      📍 ${d.pickup||"-"} → ${d.dropoff||"-"}<br>
      🕒 ${d.date||""} ${d.time||""}<br>

      💰 £${fare || "0"}

      <div class="actions">

        ${d.status==="new" ? `<button class="accept" onclick="accept('${id}')">Accept</button>` : ""}

        ${d.status==="accepted" ? `<button class="done" onclick="status('${id}','done')">Complete</button>` : ""}

        <button class="reject" onclick="status('${id}','rejected')">Reject</button>

        <button class="fare" onclick="editFare('${id}', '${fare}')">Edit Fare</button>

        <button class="edit" onclick="editBooking('${id}')">Edit</button>

        <button class="secondary" onclick="messageCustomer('${id}')">Message</button>

      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("earn").innerText = total.toFixed(2);
  document.getElementById("count").innerText = count;
}

/* STATUS */
function status(id,s){
  db.collection("bookings").doc(id).update({status:s});
}

/* ACCEPT */
function accept(id){
  status(id,"accepted");
  messageCustomer(id);
}

/* FARE EDIT */
function editFare(id,current){
  const newFare = prompt("Enter fare (£):", current||"");
  if(newFare===null) return;

  db.collection("bookings").doc(id).update({
    fare: newFare
  });
}

/* BOOKING EDIT */
function editBooking(id){
  const item = all.find(b=>b.id===id);
  const d = item.d;

  const name = prompt("Name:", d.name||"");
  if(name===null) return;

  const phone = prompt("Phone:", d.phone||"");
  const pickup = prompt("Pickup:", d.pickup||"");
  const dropoff = prompt("Dropoff:", d.dropoff||"");
  const date = prompt("Date (YYYY-MM-DD):", d.date||"");
  const time = prompt("Time:", d.time||"");

  db.collection("bookings").doc(id).update({
    name, phone, pickup, dropoff, date, time
  });
}

/* MESSAGE LOGIC */
function messageCustomer(id){
  const item = all.find(b=>b.id===id);
  const d = item.d;

  if(!d.phone) return alert("No phone number");

  const source = (d.source||"").toLowerCase();

  if(source==="email"){
    sendEmail(d);
  } else {
    sendWhatsApp(d);
  }
}

/* WHATSAPP */
function sendWhatsApp(d){
  let phone = d.phone.replace(/\D/g,'');

  if(phone.startsWith("0")) phone="44"+phone.substring(1);

  const msg = encodeURIComponent(
`Hi ${d.name||""}

Your taxi is confirmed 🚕
Pickup: ${d.pickup}
Dropoff: ${d.dropoff}
Time: ${d.date} ${d.time}

BD Taxi`
  );

  window.open("https://wa.me/"+phone+"?text="+msg);
}

/* EMAIL */
function sendEmail(d){
  const subject = encodeURIComponent("Taxi Booking Confirmation");
  const body = encodeURIComponent(
`Hi ${d.name},

Your taxi is confirmed.

Pickup: ${d.pickup}
Dropoff: ${d.dropoff}
Date: ${d.date}
Time: ${d.time}

Thank you,
BD Taxi`
  );

  window.location.href = `mailto:${d.email}?subject=${subject}&body=${body}`;
}

/* LOAD */
db.collection("bookings").onSnapshot(snap=>{
  all=[];
  snap.forEach(doc=>{
    all.push({id:doc.id, d:doc.data()});
  });
  render();
});
</script>

</body>
</html>
