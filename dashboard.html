<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>

/* ================= BASE ================= */
body {
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  background: #f8fafc;
  margin: 0;
  padding: 20px;
  color: #0f172a;
}

/* ================= HEADINGS ================= */
h1 {
  margin: 0;
  font-weight: 600;
  font-size: 24px;
}

h3 {
  margin: 25px 0 10px;
  font-size: 16px;
  font-weight: 600;
  color: #334155;
}

/* ================= TOPBAR ================= */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  padding: 12px 16px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

.topbar button {
  margin-left: 8px;
}

/* ================= TABLE CARD ================= */
.table-wrap {
  background: #ffffff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

/* ================= TABLE ================= */
table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #4f46e5;
  color: white;
}

th {
  padding: 12px;
  text-align: left;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.3px;
}

td {
  padding: 12px;
  border-bottom: 1px solid #e2e8f0;
  font-size: 14px;
}

tr:hover {
  background: #f9fbff;
}

/* ================= STATUS BADGES ================= */
.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}

.badge.accepted { background:#dcfce7; color:#166534; }
.badge.pending { background:#fef9c3; color:#854d0e; }
.badge.rejected { background:#fee2e2; color:#991b1b; }
.badge.done { background:#e0f2fe; color:#075985; }

/* ================= BUTTONS ================= */
button {
  padding: 7px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}

.accept { background:#22c55e; color:white; }
.reject { background:#ef4444; color:white; }
.secondary { background:#64748b; color:white; }
.delete { background:#f87171; color:white; }

/* ================= INPUT ================= */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  outline: none;
}

input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

/* ================= MODAL ================= */
#editModal {
  backdrop-filter: blur(4px);
}

#editModal > div {
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* ================= LOGIN ================= */
#loginScreen {
  max-width: 320px;
  margin: 120px auto;
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  table, thead, tbody, th, td, tr {
    display: block;
  }

  thead { display:none; }

  tr {
    background:white;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
  }

  td {
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border:none;
    font-size:13px;
  }

  td::before {
    font-weight:600;
    color:#64748b;
  }

  td:nth-child(1)::before { content:"Date"; }
  td:nth-child(2)::before { content:"Name"; }
  td:nth-child(3)::before { content:"Phone"; }
  td:nth-child(4)::before { content:"Email"; }
  td:nth-child(5)::before { content:"Pickup"; }
  td:nth-child(6)::before { content:"Dropoff"; }
  td:nth-child(7)::before { content:"Fare"; }

}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>BD Taxi Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="topbar">
    <h1>🚕 BD Taxi Dashboard</h1>
    <div>
      <button onclick="clearTrash()">🗑 Clear</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="bookings"></div>
</div>

<!-- MODAL -->
<div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;">
  <div>
    <h3>Edit Booking</h3>
    <input id="editName">
    <input id="editPhone">
    <input id="editPickup">
    <input id="editDropoff">
    <input id="editDate" type="date">
    <input id="editTime" type="time">
    <input id="editFare">
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let allBookings = [];
let currentEditId = null;

/* HELPERS */
const getEl = id => document.getElementById(id);
const formatMoney = v => "£" + Number(v || 0).toFixed(2);

/* STATUS BADGE */
function getStatusBadge(status){
  status = (status || "pending").toLowerCase();
  return `<span class="badge ${status}">${status}</span>`;
}

/* RENDER */
function renderTable(title, list){
  if(!list.length) return `<h3>${title}</h3><p>No bookings</p>`;

  let html = `<h3>${title}</h3><div class="table-wrap"><table><thead>
  <tr>
    <th>Date</th><th>Name</th><th>Phone</th><th>Email</th>
    <th>Pickup</th><th>Dropoff</th><th>Fare</th><th>Status</th><th>Actions</th>
  </tr></thead><tbody>`;

  list.forEach(b=>{
    const d = b.data || {};
    html += `<tr>
      <td>${d.date||""} ${d.time||""}</td>
      <td>${d.name||""}</td>
      <td>${d.phone||""}</td>
      <td>${d.email||""}</td>
      <td>${d.pickup||""}</td>
      <td>${d.dropoff||""}</td>
      <td>${formatMoney(d.fare)}</td>
      <td>${getStatusBadge(d.status)}</td>
      <td>
        <button class="secondary" onclick="editBooking('${b.id}')">Edit</button>
        <button class="delete" onclick="deleteBooking('${b.id}')">Delete</button>
      </td>
    </tr>`;
  });

  html += "</tbody></table></div>";
  return html;
}

function renderBookings(){
  getEl("bookings").innerHTML = renderTable("All Bookings", allBookings);
}

/* CRUD */
function editBooking(id){
  const b = allBookings.find(x=>x.id===id).data;
  currentEditId=id;

  editName.value=b.name||"";
  editPhone.value=b.phone||"";
  editPickup.value=b.pickup||"";
  editDropoff.value=b.dropoff||"";
  editDate.value=b.date||"";
  editTime.value=b.time||"";
  editFare.value=b.fare||"";

  editModal.style.display="flex";
}

async function saveEdit(){
  await db.collection("bookings").doc(currentEditId).update({
    name:editName.value,
    phone:editPhone.value,
    pickup:editPickup.value,
    dropoff:editDropoff.value,
    date:editDate.value,
    time:editTime.value,
    fare:Number(editFare.value||0)
  });
  closeModal();
}

function closeModal(){
  editModal.style.display="none";
}

/* DELETE */
async function deleteBooking(id){
  if(confirm("Delete?")){
    await db.collection("bookings").doc(id).update({status:"deleted"});
  }
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(user){
    loginScreen.style.display="none";
    app.style.display="block";

    db.collection("bookings").onSnapshot(snap=>{
      allBookings=[];
      snap.forEach(doc=>allBookings.push({id:doc.id,data:doc.data()}));
      renderBookings();
    });
  } else {
    loginScreen.style.display="block";
    app.style.display="none";
  }
});

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){
  auth.signOut();
}

</script>
</body>
</html>
