<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  color: #1e293b;
}

/* HEADINGS */
h1 {
  margin-bottom: 20px;
  font-weight: 600;
}

h3 {
  margin: 20px 0 10px;
}

/* TABLE CARD */
.table-wrap {
  background: #ffffff;
  border-radius: 14px;
  overflow-x: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  margin-bottom: 25px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

/* HEADER */
thead {
  background: #4d4dff;
  color: white;
}

th {
  padding: 12px;
  text-align: left;
  font-weight: 500;
  font-size: 14px;
}

/* CELLS */
td {
  padding: 12px;
  border-bottom: 1px solid #e2e8f0;
  font-size: 14px;
  vertical-align: top;
}

/* ROW HOVER */
tr:hover {
  background: #f8faff;
  transition: 0.2s;
}

/* BUTTONS */
button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  margin: 2px;
  transition: 0.2s;
}

/* BUTTON COLORS */
.accept {
  background: #22c55e;
  color: white;
}

.complete {
  background: #0ea5e9;
  color: white;
}

.reject {
  background: #ef4444;
  color: white;
}

.secondary {
  background: #64748b;
  color: white;
}

/* BUTTON HOVER */
button:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  outline: none;
  box-sizing: border-box;
}

/* MODAL */
#editModal > div {
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* LOGIN BOX */
#loginScreen {
  max-width: 300px;
  margin: 100px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* LOGOUT BUTTON */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.action-cell {
  min-width: 210px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <br><br>
  <input id="password" type="password" placeholder="Password">
  <br><br>
  <button type="button" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="topbar">
    <h1>🚕 BD Taxi Dashboard</h1>
    <button type="button" onclick="logout()">Logout</button>
  </div>
  <div id="bookings"></div>
</div>

<!-- MODAL -->
<div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:999;">
  <div style="background:white;padding:20px;border-radius:10px;width:320px;">
    <h3>Edit Booking</h3>

    <input id="editName" placeholder="Name">
    <input id="editPhone" placeholder="Phone">
    <input id="editPickup" placeholder="Pickup">
    <input id="editDropoff" placeholder="Dropoff">
    <input id="editDate" type="date">
    <input id="editTime" type="time">
    <input id="editFare" placeholder="Fare">

    <button type="button" onclick="saveEdit()">Save</button>
    <button type="button" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let allBookings = [];
let currentEditId = null;

/* HELPERS */
function getEl(id) {
  return document.getElementById(id);
}

function formatMoney(v) {
  return "£" + Number(v || 0).toFixed(2);
}

function formatPhone(phone) {
  if (!phone) return "";
  let p = String(phone).replace(/\D/g, "");
  if (p.startsWith("0")) p = "44" + p.substring(1); // UK format
  return p;
}

function openWhatsApp(phone, msg) {
  const p = formatPhone(phone);
  if (!p) {
    alert("No phone number");
    return;
  }
  window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, "_blank");
}

function closeModal() {
  getEl("editModal").style.display = "none";
  currentEditId = null;
}

/* LOGIN */
async function login() {
  try {
    await auth.signInWithEmailAndPassword(
      getEl("email").value.trim(),
      getEl("password").value
    );
  } catch (e) {
    alert("Login failed: " + e.message);
    console.error(e);
  }
}

async function logout() {
  try {
    await auth.signOut();
  } catch (e) {
    alert("Logout failed: " + e.message);
    console.error(e);
  }
}

/* RENDER */
function renderBookings() {
  const today = new Date().toISOString().split("T")[0];

  const groups = {
  today: [],
  future: [],
  rejected: [],
  done: [],
  deleted: []   // 
};

  allBookings.forEach(b => {
    const d = b.data || {};
    const status = (d.status || "").toLowerCase();

    if (status === "deleted") {
  groups.deleted.push(b);
}
else if (status === "rejected" || status === "cancelled") {
  groups.rejected.push(b);
}
else if (status === "done") {
  groups.done.push(b);
}
else if (d.date === today) {
  groups.today.push(b);
}
else {
  groups.future.push(b);
}
   
  });

 getEl("bookings").innerHTML =
  renderTable("📅 Today's Bookings", groups.today) +
  renderTable("⏳ Future Bookings", groups.future) +
  renderTable("⛔ Cancelled", groups.rejected) +
  renderTable("📊 History", groups.done) +
  renderTable("🗑️ Trash", groups.deleted);  // 
}

function renderTable(title, list) {
  if (!list.length) {
    return `<h3>${title}</h3><p>No bookings</p>`;
  }

  let html = `
    <h3>${title}</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Pickup</th>
            <th>Dropoff</th>
            <th>Fare</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
  `;

  list.forEach(b => {
    const d = b.data || {};
    html += `
      <tr>
        <td>${d.date || ""} ${d.time || ""}</td>
        <td>${d.name || ""}</td>
        <td>${d.phone || ""}</td>
        <td>${d.pickup || ""}</td>
        <td>${d.dropoff || ""}</td>
        <td>${d.fare !== undefined && d.fare !== null && d.fare !== "" ? "£" + Number(d.fare).toFixed(2) : "-"}</td>
        <td class="action-cell">
        ${
  title.includes("Trash")
    ? `
      <button class="accept" onclick="restoreBooking('${b.id}')">Restore</button>
    `
    : `
      <button class="secondary" onclick="editBooking('${b.id}')">Edit</button>
      <button class="reject" onclick="deleteBooking('${b.id}')">Delete</button>
      <button class="accept" onclick="acceptBooking('${b.id}')">Accept</button>
      <button class="reject" onclick="rejectBooking('${b.id}')">Reject</button>
    `
}
        </td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  return html;
}

/* ACTIONS */
function editBooking(id) {
  const booking = allBookings.find(x => x.id === id);
  if (!booking) {
    alert("Booking not found");
    return;
  }

  const b = booking.data || {};
  currentEditId = id;

  getEl("editName").value = b.name || "";
  getEl("editPhone").value = b.phone || "";
  getEl("editPickup").value = b.pickup || "";
  getEl("editDropoff").value = b.dropoff || "";
  getEl("editDate").value = b.date || "";
  getEl("editTime").value = b.time || "";
  getEl("editFare").value = b.fare || "";

  getEl("editModal").style.display = "flex";
}

async function saveEdit() {
  if (!currentEditId) {
    alert("No booking selected");
    return;
  }

  try {
    await db.collection("bookings").doc(currentEditId).update({
      name: getEl("editName").value.trim(),
      phone: getEl("editPhone").value.trim(),
      pickup: getEl("editPickup").value.trim(),
      dropoff: getEl("editDropoff").value.trim(),
      date: getEl("editDate").value,
      time: getEl("editTime").value,
      fare: Number(getEl("editFare").value || 0)
    });

    getEl("editModal").style.display = "none";
    currentEditId = null;
    alert("Saved successfully");
  } catch (e) {
    alert("Save failed: " + e.message);
    console.error("Save failed:", e);
  }
}

async function deleteBooking(id) {
  if (!confirm("Delete booking?")) return;

  try {
await db.collection("bookings").doc(id).update({
  status: "deleted",
  deletedAt: new Date().toISOString()
});
    alert("Deleted");
  } catch (e) {
    alert("Delete failed: " + e.message);
    console.error("Delete failed:", e);
  }
}
async function restoreBooking(id) {
  try {
    await db.collection("bookings").doc(id).update({
      status: "pending"
    });

    alert("Restored");
  } catch (e) {
    alert("Restore failed: " + e.message);
  }
}
async function acceptBooking(id) {
  try {
    const booking = allBookings.find(x => x.id === id);
    if (!booking) {
      alert("Booking not found");
      return;
    }

    const b = booking.data || {};

    const msg = `Hi ${b.name || ""},

Your taxi booking is CONFIRMED 🚕

Pickup: ${b.pickup || "-"}
Destination: ${b.dropoff || "-"}
Date: ${b.date || "-"} ${b.time || ""}
Fare: ${formatMoney(b.fare)}

Thank you for choosing BD Taxi.`;

    openWhatsApp(b.phone, msg);

    await db.collection("bookings").doc(id).update({
      status: "accepted"
    });
  } catch (e) {
    alert("Accept failed: " + e.message);
    console.error("Accept failed:", e);
  }
}

async function rejectBooking(id) {
  try {
    const booking = allBookings.find(x => x.id === id);
    if (!booking) {
      alert("Booking not found");
      return;
    }

    const b = booking.data || {};

    const msg = `Hi ${b.name || ""},

Unfortunately we cannot fulfil your booking at the requested time.

Please contact us to reschedule.

– BD Taxi`;

    openWhatsApp(b.phone, msg);

    await db.collection("bookings").doc(id).update({
      status: "rejected"
    });
  } catch (e) {
    alert("Reject failed: " + e.message);
    console.error("Reject failed:", e);
  }
}

/* AUTH */
auth.onAuthStateChanged(user => {
  if (user) {
    getEl("loginScreen").style.display = "none";
    getEl("app").style.display = "block";

    db.collection("bookings").onSnapshot(
      snapshot => {
        allBookings = [];
        snapshot.forEach(doc => {
          allBookings.push({
            id: doc.id,
            data: doc.data()
          });
        });
        renderBookings();
      },
      error => {
        alert("Failed to load bookings: " + error.message);
        console.error("Snapshot error:", error);
      }
    );
  } else {
    getEl("loginScreen").style.display = "block";
    getEl("app").style.display = "none";
  }
});

/* expose functions for onclick */
window.login = login;
window.logout = logout;
window.editBooking = editBooking;
window.saveEdit = saveEdit;
window.closeModal = closeModal;
window.deleteBooking = deleteBooking;
window.acceptBooking = acceptBooking;
window.rejectBooking = rejectBooking;
window.restoreBooking = restoreBooking;
</script>

</body>
</html>
