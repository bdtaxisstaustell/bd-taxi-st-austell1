<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }
h1 { text-align:center; padding:10px; }

.top-bar {
  display:flex; justify-content:space-between;
  padding:10px;
}

.tabs {
  display:flex;
  gap:5px;
  padding:10px;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.active { background:#25D366; color:white; }

.booking {
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
  line-height:1.5;
}

.today { border-left:6px solid orange; }

.tag {
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
  margin-bottom:6px;
}

.whatsapp { background:#25D366; color:white; }
.email { background:#007BFF; color:white; }
.web { background:#666; color:white; }

.section {
  margin-top:5px;
  font-size:14px;
}

.btn-group {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.btn-group button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.accept { background:green; color:white; }
.reject { background:red; color:white; }
.call { background:#222; color:white; }
</style>
</head>

<body>

<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin.html";
}
</script>

<h1>🚕 Taxi Dashboard</h1>

<div class="top-bar">
  <div>
    💰 £<span id="todayEarnings">0</span> |
    📦 <span id="totalBookings">0</span>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<div class="tabs">
  <button onclick="setTab('new')" class="active" id="tab-new">New</button>
  <button onclick="setTab('future')" id="tab-future">Future</button>
  <button onclick="setTab('done')" id="tab-done">Completed</button>
</div>

<div id="bookings"></div>

<audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q",
authDomain: "taxi-bookings-69cff.firebaseapp.com",
projectId: "taxi-bookings-69cff",
storageBucket: "taxi-bookings-69cff.firebasestorage.app",
messagingSenderId: "1074073110832",
appId: "1:1074073110832:web:7abfe2772b46245187a0f5",
measurementId: "G-FT43W7YHQ9"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "admin.html";
  }
});

const db = firebase.firestore();
</script>

<script>

let currentTab = "new";
let unsubscribe = null;
let isInitialLoad = true;

function setTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  loadBookings();
}

function notify(){
  const sound = document.getElementById("sound");
  sound.play().catch(()=>{});

  if (Notification.permission === "granted") {
    new Notification("🚕 New Booking");
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission();
  }
}

function shareLocation(id){
  navigator.geolocation.getCurrentPosition(pos=>{
    db.collection("bookings").doc(id).update({
      driverLat: pos.coords.latitude,
      driverLng: pos.coords.longitude
    });
    alert("Location sent");
  });
}

/* ✅ CORRECT MESSAGE (YOUR REQUEST) */
function autoReply(phone,name){
  if(!phone) return;

  if(phone.startsWith("0")){
    phone="44"+phone.substring(1);
  }

  const msg = encodeURIComponent(
    "Hi " + name + ", your taxi booking is confirmed. Thank you for choosing BD Taxi St Austell. We look forward to providing you with a safe and comfortable journey.\n\nKind regards,\nBD Taxi St Austell 🚕"
  );

  window.open("https://wa.me/"+phone+"?text="+msg);
}

function loadBookings(){

  if(unsubscribe){
    unsubscribe();
  }

  unsubscribe = db.collection("bookings")
    .orderBy("createdAt","desc")
    .onSnapshot(snapshot=>{

      const today = new Date().toISOString().split("T")[0];

      let total = 0;
      let count = 0;

      const container = document.getElementById("bookings");
      container.innerHTML="";

      snapshot.docChanges().forEach(change => {
        if(change.type === "added" && !isInitialLoad){
          notify();
        }
      });

      snapshot.forEach(doc => {

        const data = doc.data();
        const id = doc.id;

        const isToday = data.date === today;

        let bookingTime = null;
        if(data.date && data.time){
          bookingTime = new Date(data.date + "T" + data.time);
        }

        const isFuture = bookingTime ? bookingTime > new Date() : false;

        let show = false;

        if(currentTab==="new" && data.status!=="done") show = true;
        if(currentTab==="future" && isFuture) show = true;
        if(currentTab==="done" && data.status==="done") show = true;

        if(!show) return;

        count++;

        if(isToday && data.fare){
          const num = parseInt((data.fare || "").replace(/[^\d]/g,""));
          total += num || 0;
        }

        let sourceTag = "";
        if(data.source === "whatsapp"){
          sourceTag = `<span class="tag whatsapp">WhatsApp</span>`;
        } else if(data.source === "email"){
          sourceTag = `<span class="tag email">Email</span>`;
        } else {
          sourceTag = `<span class="tag web">Web</span>`;
        }

        const div = document.createElement("div");
        div.className = "booking "+(isToday?"today":"");

        div.innerHTML = `
          ${sourceTag}
          <b>${data.name || "No Name"}</b>

          <div class="section">
            ${data.phone ? "📞 " + data.phone : ""}
            ${data.phone ? `<button class="call" onclick="window.location.href='tel:${data.phone}'">Call</button>` : ""}
          </div>

          <div class="section">
            ${data.email ? "📧 " + data.email : ""}
          </div>

          <div class="section">
            📍 ${data.pickup || "-"} → ${data.dropoff || "-"}
          </div>

          <div class="section">
            🕒 ${data.date || "-"} ${data.time || ""}
          </div>

          ${data.notes ? `<div class="section">📝 ${data.notes}</div>` : ""}

          <div class="btn-group">
            <button class="accept" onclick="accept('${id}','${data.phone}','${data.name}')">Accept</button>
            <button class="reject" onclick="updateStatus('${id}','rejected')">Reject</button>
            <button onclick="deleteBooking('${id}')">Delete</button>
            <button onclick="shareLocation('${id}')">📍</button>
          </div>
        `;

        container.appendChild(div);
      });

      document.getElementById("todayEarnings").innerText = total;
      document.getElementById("totalBookings").innerText = count;

      isInitialLoad = false;
    });
}

function accept(id,phone,name){
  db.collection("bookings").doc(id).update({ status:"done" });
  autoReply(phone,name);
}

function updateStatus(id,status){
  db.collection("bookings").doc(id).update({ status });
}

function deleteBooking(id){
  if(confirm("Delete?")){
    db.collection("bookings").doc(id).delete();
  }
}

  function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href="admin.html";
  });
}

loadBookings();

</script>

</body>
</html>
