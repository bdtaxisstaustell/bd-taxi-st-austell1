<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }

h1 { text-align:center; padding:10px; }

.top-bar {
  display:flex; justify-content:space-between;
  padding:10px;
}

.tabs {
  display:flex;
  gap:5px;
  padding:10px;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.active { background:#25D366; color:white; }

.booking {
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
}

.today { border-left:6px solid orange; }

.btn-group {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.btn-group button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.accept { background:green; color:white; }
.reject { background:red; color:white; }
.driver { background:#007bff; color:white; }

</style>
</head>

<body>

<!-- LOGIN CHECK -->
<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin.html";
}
</script>

<h1>🚕 Taxi Dashboard</h1>

<div class="top-bar">
  <div>
    💰 £<span id="todayEarnings">0</span> |
    📦 <span id="totalBookings">0</span>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<div class="tabs">
  <button onclick="setTab('new')" class="active" id="tab-new">New</button>
  <button onclick="setTab('future')" id="tab-future">Future</button>
  <button onclick="setTab('done')" id="tab-done">Completed</button>
</div>

<div id="bookings"></div>

<!-- SOUND -->
<audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>

let currentTab = "new";

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");

  loadBookings();
}

/* 🔔 NOTIFICATION + SOUND */
function notify(){
  document.getElementById("sound").play();

  if(Notification.permission==="granted"){
    new Notification("New Booking 🚕");
  } else {
    Notification.requestPermission();
  }
}

/* 📍 DRIVER LOCATION */
function shareLocation(id){
  navigator.geolocation.getCurrentPosition(pos=>{
    db.collection("bookings").doc(id).update({
      driverLat: pos.coords.latitude,
      driverLng: pos.coords.longitude
    });
    alert("Location sent");
  });
}

/* 🤖 AUTO WHATSAPP REPLY */
function autoReply(phone,name){
  if(!phone) return;

  if(phone.startsWith("0")){
    phone="44"+phone.substring(1);
  }

  const msg = encodeURIComponent(
    "Hi "+name+", your taxi is confirmed and on the way 🚕"
  );

  window.open("https://wa.me/"+phone+"?text="+msg);
}

/* LOAD BOOKINGS */
function loadBookings(){

  db.collection("bookings")
    .orderBy("createdAt","desc")
    .onSnapshot(snapshot=>{

      const today = new Date().toISOString().split("T")[0];

      let total = 0;
      let count = 0;

      const container = document.getElementById("bookings");
      container.innerHTML="";

      snapshot.forEach(doc=>{

        const data = doc.data();
        const id = doc.id;

        const isToday = data.date===today;
        const isFuture = new Date(data.date+"T"+data.time) > new Date();

        let show = false;

        if(currentTab==="new" && data.status!=="done") show = true;
        if(currentTab==="future" && isFuture) show = true;
        if(currentTab==="done" && data.status==="done") show = true;

        if(!show) return;

        count++;

        if(isToday && data.fare){
          const num = parseInt(data.fare.replace(/[^\d]/g,""));
          total += num || 0;
        }

        const div = document.createElement("div");
        div.className = "booking "+(isToday?"today":"");

        div.innerHTML = `
          <b>${data.name}</b><br>
          ${data.pickup} → ${data.dropoff}<br>
          ${data.date} ${data.time}<br>

          <div class="btn-group">
            <button class="accept" onclick="accept('${id}','${data.phone}','${data.name}')">Accept</button>
            <button class="reject" onclick="updateStatus('${id}','rejected')">Reject</button>
            <button onclick="deleteBooking('${id}')">Delete</button>
            <button onclick="shareLocation('${id}')">📍</button>
          </div>
        `;

        container.appendChild(div);

      });

      document.getElementById("todayEarnings").innerText = total;
      document.getElementById("totalBookings").innerText = count;

      if(!window.firstLoad){
        window.firstLoad = true;
      } else {
        notify();
      }

    });
}

/* ACTIONS */
function accept(id,phone,name){
  db.collection("bookings").doc(id).update({ status:"done" });
  autoReply(phone,name);
}

function updateStatus(id,status){
  db.collection("bookings").doc(id).update({ status });
}

function deleteBooking(id){
  if(confirm("Delete?")){
    db.collection("bookings").doc(id).delete();
  }
}

function logout(){
  localStorage.removeItem("adminLoggedIn");
  window.location.href="admin.html";
}

loadBookings();

</script>

</body>
</html>
