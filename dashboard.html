<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }

h1 { text-align:center; padding:10px; margin:0; }

.top-bar {
  display:flex; justify-content:space-between;
  padding:10px; background:#111; color:white;
  position:sticky; top:0; z-index:10;
}

.tabs {
  display:flex; gap:6px; padding:10px;
}

.tabs button {
  flex:1; padding:12px; border:none;
  border-radius:10px; font-weight:bold;
  background:#ddd;
}

.active { background:#111; color:white; }

.search {
  padding:10px;
}

.search input {
  width:100%; padding:12px;
  border-radius:10px; border:1px solid #ccc;
}

.booking {
  background:white;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.today { border-left:6px solid orange; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name { font-size:18px; font-weight:bold; }

.fare {
  font-size:22px;
  font-weight:bold;
  color:#16a34a;
}

.route {
  margin-top:6px;
  font-size:14px;
}

.meta {
  font-size:13px;
  color:#555;
  margin-top:4px;
}

.status {
  margin-top:6px;
  font-size:12px;
  font-weight:bold;
}

.new { color:orange; }
.accepted { color:green; }
.done { color:#2563eb; }
.rejected { color:red; }

.actions {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.actions button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.accept { background:green; color:white; }
.complete { background:#2563eb; color:white; }
.reject { background:red; color:white; }
.delete { background:#444; color:white; }
.call { background:black; color:white; }
.map { background:#666; color:white; }

.menu-btn {
  font-size:22px;
  background:none;
  border:none;
  padding:6px;
  cursor:pointer;
}

.empty {
  text-align:center;
  padding:40px;
  color:#666;
}

</style>
</head>

<body>

<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin.html";
}
</script>

<h1>🚕 BD Taxi Dashboard</h1>

<div class="top-bar">
  <div>
    💰 £<span id="earnings">0</span> |
    📦 <span id="count">0</span>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<div class="tabs">
  <button onclick="setTab('new')" class="active" id="tab-new">New</button>
  <button onclick="setTab('accepted')" id="tab-accepted">Accepted</button>
  <button onclick="setTab('done')" id="tab-done">Done</button>
  <button onclick="setTab('all')" id="tab-all">All (30d)</button>
</div>

<div class="search">
  <input id="search" placeholder="Search bookings..." oninput="render()">
</div>

<div id="bookings"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentTab="new";
let all=[];

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  render();
}

function statusClass(s){
  if(s==="accepted") return "accepted";
  if(s==="done") return "done";
  if(s==="rejected") return "rejected";
  return "new";
}

function inLast30Days(dateStr){
  if(!dateStr) return false;
  const d=new Date(dateStr);
  const now=new Date();
  return (now-d)/(1000*60*60*24)<=30;
}

function render(){
  const container=document.getElementById("bookings");
  container.innerHTML="";

  const search=document.getElementById("search").value.toLowerCase();

  let count=0;
  let total=0;

  all.forEach(item=>{
    const d=item.data;
    const status=d.status||"new";

    if(search && JSON.stringify(d).toLowerCase().indexOf(search)===-1) return;

    if(currentTab==="new" && status!=="new") return;
    if(currentTab==="accepted" && status!=="accepted") return;
    if(currentTab==="done" && status!=="done") return;
    if(currentTab==="all" && !inLast30Days(d.date)) return;

    count++;

    if(status==="done" && d.fare){
      total+=parseFloat(d.fare)||0;
    }

    const div=document.createElement("div");
    div.className="booking "+(d.date===new Date().toISOString().split("T")[0]?"today":"");

    div.innerHTML=`
      <div class="header">
        <div class="name">${d.name||"No Name"}</div>
        <div class="fare">£${d.fare||"-"}</div>
      </div>

      <div class="route">📍 ${d.pickup||"-"} → ${d.dropoff||"-"}</div>

      <div class="meta">🕒 ${d.date||"-"} ${d.time||""}</div>
      <div class="meta">📞 ${d.phone||"-"}</div>

      <div class="status ${statusClass(status)}">${status.toUpperCase()}</div>

      <div class="actions">
        ${status==="new"?`<button class="accept" onclick="update('${item.id}','accepted')">Accept</button>`:""}
        ${status==="accepted"?`<button class="complete" onclick="update('${item.id}','done')">Complete</button>`:""}
        ${status!=="rejected"?`<button class="reject" onclick="update('${item.id}','rejected')">Reject</button>`:""}

        <button class="call" onclick="call('${d.phone}')">Call</button>
        <button class="map" onclick="map('${d.pickup}')">Map</button>
        <button class="delete" onclick="del('${item.id}')">Delete</button>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("earnings").innerText=total.toFixed(2);
  document.getElementById("count").innerText=count;

  if(!count){
    container.innerHTML="<div class='empty'>No bookings</div>";
  }
}

function update(id,status){
  db.collection("bookings").doc(id).update({status});
}

function del(id){
  if(confirm("Delete booking?")){
    db.collection("bookings").doc(id).delete();
  }
}

function call(p){
  if(p) window.location.href="tel:"+p;
}

function map(addr){
  if(addr) window.open("https://maps.google.com?q="+encodeURIComponent(addr));
}

function logout(){
  localStorage.removeItem("adminLoggedIn");
  location.href="admin.html";
}

db.collection("bookings")
.onSnapshot(snap=>{
  all=[];
  snap.forEach(doc=>{
    all.push({id:doc.id,data:doc.data()});
  });
  render();
});

</script>

</body>
</html>
