<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.table-wrap { background:#fff; border-radius:10px; overflow:auto; }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px; border-bottom:1px solid #eee; }
thead { background:#4d4dff; color:#fff; }

button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; margin:2px; }
.accept { background:#16a34a; color:white; }
.complete { background:#0ea5e9; color:white; }
.reject { background:#dc2626; color:white; }
.secondary { background:#64748b; color:white; }

input { width:100%; padding:8px; margin-bottom:8px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h1>🚕 BD Taxi Dashboard</h1>
  <button onclick="logout()">Logout</button>
  <div id="bookings"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let allBookings = [];
let currentEditId = null;

/* LOGIN */
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}
function logout() { auth.signOut(); }

/* HELPERS */
function formatMoney(v) { return "£" + Number(v||0).toFixed(2); }

function formatPhone(phone){
  let p = phone.replace(/\D/g,'');
  if(p.startsWith("0")) p = "44" + p.substring(1); // UK fix
  return p;
}

function openWhatsApp(phone, msg){
  if(!phone) return alert("No phone");
  window.open(`https://wa.me/${formatPhone(phone)}?text=${encodeURIComponent(msg)}`);
}

/* RENDER */

  function renderBookings(){

  const today = new Date().toISOString().split("T")[0];

  const groups = {
    today: [],
    future: [],
    rejected: [],
    done: []
  };

  allBookings.forEach(b=>{
    const d = b.data;
    const status = (d.status || "").toLowerCase();

    if(status === "rejected" || status === "cancelled"){
      groups.rejected.push(b);
    }
    else if(status === "done"){
      groups.done.push(b);
    }
    else if(d.date === today){
      groups.today.push(b);
    }
    else{
      groups.future.push(b);
    }
  });

  bookings.innerHTML =
    renderTable("📅 Today's Bookings", groups.today) +
    renderTable("⏳ Future Bookings", groups.future) +
    renderTable("⛔ Cancelled", groups.rejected) +
    renderTable("📊 History", groups.done);
}


 function renderTable(title, list){

  if(!list.length){
    return `<h3>${title}</h3><p>No bookings</p>`;
  }

  let html = `
  <h3>${title}</h3>
  <div class="table-wrap">
  <table>
  <thead>
    <tr>
      <th>Date</th><th>Name</th><th>Phone</th>
      <th>Pickup</th><th>Dropoff</th>
      <th>Fare</th><th>Actions</th>
    </tr>
  </thead>
  <tbody>
  `;

  list.forEach(b=>{
    const d = b.data;

    html += `
    <tr>
      <td>${d.date || ""} ${d.time || ""}</td>
      <td>${d.name || ""}</td>
      <td>${d.phone || ""}</td>
      <td>${d.pickup || ""}</td>
      <td>${d.dropoff || ""}</td>
      <td>${d.fare ? "£"+Number(d.fare).toFixed(2) : "-"}</td>
      <td>
        <button class="secondary" onclick="editBooking('${b.id}')">Edit</button>
        <button class="reject" onclick="deleteBooking('${b.id}')">Delete</button>
        <button class="accept" onclick="acceptBooking('${b.id}')">Accept</button>
        <button class="reject" onclick="rejectBooking('${b.id}')">Reject</button>
      </td>
    </tr>`;
  });

  html += "</tbody></table></div>";

  return html;
} 

/* ACTIONS */
function acceptBooking(id){
  const b = allBookings.find(x=>x.id===id).data;

  const msg = `Hi ${b.name||""},

Your taxi booking is CONFIRMED 🚕

Pickup: ${b.pickup||"-"}
Destination: ${b.dropoff||"-"}
Date: ${b.date||"-"} ${b.time||""}
Fare: ${formatMoney(b.fare)}

Thank you for choosing BD Taxi.`;

  openWhatsApp(b.phone, msg);
  db.collection("bookings").doc(id).update({status:"accepted"});
}

function rejectBooking(id){
  const b = allBookings.find(x=>x.id===id).data;

  const msg = `Hi ${b.name||""},

Unfortunately we cannot fulfil your booking at the requested time.

Please contact us to reschedule.

– BD Taxi`;

  openWhatsApp(b.phone, msg);
  db.collection("bookings").doc(id).update({status:"rejected"});
}

function deleteBooking(id){
  if(confirm("Delete booking?"))
    db.collection("bookings").doc(id).delete();
}

function editBooking(id){
  currentEditId = id;
  const b = allBookings.find(x=>x.id===id).data;

  editName.value = b.name||"";
  editPhone.value = b.phone||"";
  editPickup.value = b.pickup||"";
  editDropoff.value = b.dropoff||"";
  editDate.value = b.date||"";
  editTime.value = b.time||"";
  editFare.value = b.fare||"";

  editModal.style.display="flex";
}

function saveEdit(){
  db.collection("bookings").doc(currentEditId).update({
    name:editName.value,
    phone:editPhone.value,
    pickup:editPickup.value,
    dropoff:editDropoff.value,
    date:editDate.value,
    time:editTime.value,
    fare:editFare.value
  });
  editModal.style.display="none";
}

/* AUTH */
auth.onAuthStateChanged(user=>{
  if(user){
    loginScreen.style.display="none";
    app.style.display="block";

    db.collection("bookings").onSnapshot(s=>{
      allBookings=[];
      s.forEach(doc=>allBookings.push({id:doc.id,data:doc.data()}));
      renderBookings();
    });

  } else {
    loginScreen.style.display="block";
    app.style.display="none";
  }
});
</script>

<!-- MODAL -->
<div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
<div style="background:white;padding:20px;border-radius:10px;width:300px;">
<h3>Edit Booking</h3>

<input id="editName" placeholder="Name">
<input id="editPhone" placeholder="Phone">
<input id="editPickup" placeholder="Pickup">
<input id="editDropoff" placeholder="Dropoff">
<input id="editDate" type="date">
<input id="editTime" type="time">
<input id="editFare" placeholder="Fare">

<button onclick="saveEdit()">Save</button>
<button onclick="editModal.style.display='none'">Cancel</button>
</div>
</div>

</body>
</html>
