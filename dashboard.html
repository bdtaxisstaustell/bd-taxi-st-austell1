<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  color: #1e293b;
}

h1 { margin-bottom: 20px; font-weight: 600; }
h3 { margin: 20px 0 10px; }

.table-wrap {
  background: #fff;
  border-radius: 14px;
  overflow-x: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  margin-bottom: 25px;
}

table { width: 100%; border-collapse: collapse; }

thead { background: #4d4dff; color: white; }

th, td {
  padding: 12px;
  text-align: left;
  font-size: 14px;
}

td {
  border-bottom: 1px solid #e2e8f0;
}

tr:hover { background: #f8faff; }

button {
  padding: 7px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.accept { background: #22c55e; color: white; }
.complete { background: #0ea5e9; color: white; }
.reject { background: #ef4444; color: white; }
.secondary { background: #64748b; color: white; }

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

#loginScreen {
  max-width: 320px;
  margin: 100px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>
</head>

<body>

<div id="loginScreen">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <h1>🚕 BD Taxi Dashboard</h1>
    <div>
      <button onclick="clearTrash()">🗑️ Clear Trash</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="bookings"></div>
</div>

<!-- MODAL -->
<div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;">
  <div style="background:white;padding:20px;border-radius:10px;width:320px;">
    <h3>Edit Booking</h3>

    <input id="editName" placeholder="Name">
    <input id="editPhone" placeholder="Phone (+44...)">
    <input id="editPickup" placeholder="Pickup">
    <input id="editDropoff" placeholder="Dropoff">
    <input id="editDate" type="date">
    <input id="editTime" type="time">
    <input id="editFare" placeholder="Fare">

    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let allBookings = [];
let currentEditId = null;

/* ---------- HELPERS ---------- */

const getEl = id => document.getElementById(id);

const formatMoney = v => "£" + Number(v || 0).toFixed(2);

/* 🔥 PROPER INTERNATIONAL PHONE FORMAT */
function formatPhone(phone) {
  if (!phone) return null;

  let p = phone.replace(/[^\d+]/g, "");

  // If starts with 0 → UK
  if (p.startsWith("0")) {
    p = "+44" + p.slice(1);
  }

  // If no + → assume UK
  if (!p.startsWith("+")) {
    p = "+44" + p;
  }

  // Remove +
  return p.replace("+", "");
}

function openWhatsApp(phone, msg) {
  const p = formatPhone(phone);

  if (!p || p.length < 10) {
    alert("Invalid phone number");
    return;
  }

  window.open(`https://wa.me/${p}?text=${encodeURIComponent(msg)}`, "_blank");
}

/* ---------- LOGIN ---------- */

async function login() {
  await auth.signInWithEmailAndPassword(
    getEl("email").value.trim(),
    getEl("password").value
  );
}

function logout() {
  auth.signOut();
}

/* ---------- RENDER ---------- */

function renderBookings() {
  let html = `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Pickup</th>
          <th>Dropoff</th>
          <th>Fare</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
  `;

  allBookings.forEach(b => {
    const d = b.data;

    html += `
      <tr>
        <td>${d.date || ""} ${d.time || ""}</td>
        <td>${d.name || ""}</td>
        <td>${d.phone || ""}</td>
        <td>${d.pickup || ""}</td>
        <td>${d.dropoff || ""}</td>
        <td>${formatMoney(d.fare)}</td>
        <td>
          <button class="secondary" onclick="editBooking('${b.id}')">Edit</button>
          <button class="accept" onclick="acceptBooking('${b.id}')">Accept</button>
          <button class="reject" onclick="rejectBooking('${b.id}')">Reject</button>
        </td>
      </tr>
    `;
  });

  html += `</tbody></table></div>`;
  getEl("bookings").innerHTML = html;
}

/* ---------- EDIT ---------- */

function editBooking(id) {
  const b = allBookings.find(x => x.id === id).data;

  currentEditId = id;

  getEl("editName").value = b.name || "";
  getEl("editPhone").value = b.phone || "";
  getEl("editPickup").value = b.pickup || "";
  getEl("editDropoff").value = b.dropoff || "";
  getEl("editDate").value = b.date || "";
  getEl("editTime").value = b.time || "";
  getEl("editFare").value = b.fare || "";

  getEl("editModal").style.display = "flex";
}

async function saveEdit() {
  const phone = getEl("editPhone").value.trim();

  if (!phone) {
    alert("Phone required");
    return;
  }

  await db.collection("bookings").doc(currentEditId).update({
    name: getEl("editName").value.trim(),
    phone,
    pickup: getEl("editPickup").value.trim(),
    dropoff: getEl("editDropoff").value.trim(),
    date: getEl("editDate").value,
    time: getEl("editTime").value,
    fare: Number(getEl("editFare").value || 0)
  });

  closeModal();
}

function closeModal() {
  getEl("editModal").style.display = "none";
}

/* ---------- ACTIONS ---------- */

async function acceptBooking(id) {
  const b = allBookings.find(x => x.id === id).data;

  const msg = `Hi ${b.name},

Your booking is CONFIRMED 🚕

Pickup: ${b.pickup}
Dropoff: ${b.dropoff}
Date: ${b.date} ${b.time}
Fare: ${formatMoney(b.fare)}

Thank you`;

  openWhatsApp(b.phone, msg);

  await db.collection("bookings").doc(id).update({ status: "accepted" });
}

async function rejectBooking(id) {
  const b = allBookings.find(x => x.id === id).data;

  const msg = `Hi ${b.name},

Sorry, we cannot take this booking.

Please contact us again.`;

  openWhatsApp(b.phone, msg);

  await db.collection("bookings").doc(id).update({ status: "rejected" });
}

/* ---------- FIREBASE ---------- */

auth.onAuthStateChanged(user => {
  if (user) {
    getEl("loginScreen").style.display = "none";
    getEl("app").style.display = "block";

    db.collection("bookings").onSnapshot(snap => {
      allBookings = snap.docs.map(doc => ({
        id: doc.id,
        data: doc.data()
      }));
      renderBookings();
    });
  } else {
    getEl("loginScreen").style.display = "block";
    getEl("app").style.display = "none";
  }
});
</script>

</body>
</html>
