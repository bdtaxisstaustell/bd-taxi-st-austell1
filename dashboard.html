<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

h1 { margin-bottom:20px; }

.table-section { margin-bottom:40px; }

.table-wrap {
  overflow-x:auto;
  background:#fff;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

table {
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}

thead {
  background:#0f172a;
  color:white;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e2e8f0;
  font-size:14px;
}

tr:hover { background:#f8fafc; }

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  margin:2px;
}

.accept { background:#16a34a; color:white; }
.complete { background:#0ea5e9; color:white; }
.reject { background:#dc2626; color:white; }
.secondary { background:#64748b; color:white; }

input {
  width:100%;
  padding:8px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<h1>🚕 BD Taxi Dashboard</h1>
<div id="bookings"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allBookings = [];
let currentEditId = null;

function todayYMD() {
  return new Date().toISOString().split("T")[0];
}

function normaliseStatus(s) {
  s = (s || "").toLowerCase();
  if (["done","completed"].includes(s)) return "done";
  if (["accepted"].includes(s)) return "accepted";
  if (["rejected","cancelled"].includes(s)) return "rejected";
  return "new";
}

function formatMoney(v) {
  return "£" + Number(v || 0).toFixed(2);
}

function groupBookings() {
  const today = todayYMD();
  const groups = { today: [], future: [], rejected: [], done: [] };

  allBookings.forEach(item => {
    const d = item.data;
    const status = normaliseStatus(d.status);

    if (status === "rejected") groups.rejected.push(item);
    else if (status === "done") groups.done.push(item);
    else if (d.date === today) groups.today.push(item);
    else groups.future.push(item);
  });

  return groups;
}

function renderBookings() {
  const g = groupBookings();

  document.getElementById("bookings").innerHTML =
    renderTable("📅 Today", g.today) +
    renderTable("⏳ Future", g.future) +
    renderTable("⛔ Cancelled", g.rejected) +
    renderTable("📊 History", g.done);
}

function renderTable(title, list) {
  if (!list.length) return `<h3>${title}</h3><p>No bookings</p>`;

  return `
  <div class="table-section">
    <h3>${title}</h3>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Name</th><th>Phone</th>
            <th>Email</th><th>Pickup</th><th>Dropoff</th>
            <th>Fare</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>${list.map(renderRow).join("")}</tbody>
      </table>
    </div>
  </div>`;
}

function renderRow(item) {
  const { id, data } = item;
  const status = normaliseStatus(data.status);

  return `
  <tr>
    <td>${data.date || ""} ${data.time || ""}</td>
    <td>${data.name || ""}</td>
    <td>${data.phone || ""}</td>
    <td>${data.email || ""}</td>
    <td>${data.pickup || ""}</td>
    <td>${data.dropoff || ""}</td>
    <td>${data.fare ? formatMoney(data.fare) : "-"}</td>
    <td>${renderActions(id, status)}</td>
  </tr>`;
}

function renderActions(id, status) {
  let b = `
    <button class="secondary" onclick="editBooking('${id}')">Edit</button>
    <button class="reject" onclick="deleteBooking('${id}')">Delete</button>
  `;

  if (status === "new") b += `<button class="accept" onclick="acceptBooking('${id}')">Accept</button>`;
  if (status === "accepted") b += `<button class="complete" onclick="updateStatus('${id}','done')">Done</button>`;

  return b;
}

function updateStatus(id, status) {
  db.collection("bookings").doc(id).update({ status });
}

function acceptBooking(id) {
  updateStatus(id, "accepted");
}

function deleteBooking(id) {
  if (confirm("Delete booking?")) {
    db.collection("bookings").doc(id).delete();
  }
}

function editBooking(id) {
  currentEditId = id;
  const b = allBookings.find(x => x.id === id).data;

  editName.value = b.name || "";
  editPhone.value = b.phone || "";
  editEmail.value = b.email || "";
  editPickup.value = b.pickup || "";
  editDropoff.value = b.dropoff || "";
  editDate.value = b.date || "";
  editTime.value = b.time || "";
  editFare.value = b.fare || "";

  editModal.style.display = "flex";
}

function saveEdit() {
  db.collection("bookings").doc(currentEditId).update({
    name: editName.value,
    phone: editPhone.value,
    email: editEmail.value,
    pickup: editPickup.value,
    dropoff: editDropoff.value,
    date: editDate.value,
    time: editTime.value,
    fare: editFare.value
  });

  editModal.style.display = "none";
}

db.collection("bookings").onSnapshot(snapshot => {
  allBookings = [];
  snapshot.forEach(doc => {
    allBookings.push({ id: doc.id, data: doc.data() });
  });
  renderBookings();
});
</script>

<!-- MODAL -->
<div id="editModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
  <div style="background:white;padding:20px;border-radius:10px;width:300px;">
    <h3>Edit Booking</h3>

    <input id="editName" placeholder="Name">
    <input id="editPhone" placeholder="Phone">
    <input id="editEmail" placeholder="Email">
    <input id="editPickup" placeholder="Pickup">
    <input id="editDropoff" placeholder="Dropoff">
    <input id="editDate" type="date">
    <input id="editTime" type="time">
    <input id="editFare" placeholder="Fare">

    <button onclick="saveEdit()">Save</button>
    <button onclick="editModal.style.display='none'">Cancel</button>
  </div>
</div>

</body>
</html>
