<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin.html";
}
</script>

<!DOCTYPE html>
<html>
<head>
  <title>Taxi Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .booking {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      line-height: 1.6;
    }

    .new { border-left: 6px solid orange; }
    .accepted { border-left: 6px solid green; }
    .rejected { border-left: 6px solid red; }

    button {
      margin-top: 10px;
      margin-right: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .accept { background: green; color: white; }
    .reject { background: red; color: white; }

    .logout {
      margin-bottom: 20px;
      background: black;
      color: white;
    }
  </style>

</head>
<body>

<h1>🚕 Taxi Bookings Dashboard</h1>

<button class="logout" onclick="logout()">Logout</button>

<div id="bookings"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
  storageBucket: "taxi-bookings-69cff.firebasestorage.app",
  messagingSenderId: "1074073110832",
  appId: "1:1074073110832:web:7abfe2772b46245187a0f5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadBookings() {
  db.collection("bookings")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      const container = document.getElementById("bookings");
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const sourceLabel = data.source === "email"
          ? "📧 Email"
          : "🟢 WhatsApp";

        const div = document.createElement("div");
        div.className = "booking " + (data.status || "new");

        div.innerHTML = `
          <strong>${data.name || "No name"}</strong> — ${sourceLabel}<br>
          📍 ${data.pickup || ""} → ${data.dropoff || ""}<br>
          📅 ${data.date || ""} at ${data.time || ""}<br>
          👥 ${data.passengers || ""}<br>
          📞 ${data.phone || ""}<br>
          ✉️ ${data.email || ""}<br>
          💰 ${data.fare || ""}<br>
          📝 ${data.notes || ""}<br>

          <button class="accept" onclick="updateStatus('${doc.id}','accepted')">Accept</button>
          <button class="reject" onclick="updateStatus('${doc.id}','rejected')">Reject</button>
        `;

        container.appendChild(div);
      });

    });
}

function updateStatus(id, status) {
  db.collection("bookings").doc(id).update({
    status: status
  });
}

function logout() {
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "admin.html";
}

loadBookings();
</script>

</body>
</html>
