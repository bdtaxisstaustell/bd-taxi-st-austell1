<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BD Taxi Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#eef2f7; }

/* HEADER */
.top {
  background:#0f172a;
  color:white;
  padding:12px;
  position:sticky;
  top:0;
  z-index:10;
}

.top h2 { margin:0; font-size:18px; }

.stats {
  display:flex;
  gap:10px;
  margin-top:8px;
  font-size:14px;
}

/* TABS */
.tabs {
  display:flex;
  gap:6px;
  padding:10px;
  flex-wrap:wrap;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  background:#ddd;
}

.tabs .active {
  background:#0f172a;
  color:white;
}

/* CARD */
.card {
  background:white;
  margin:10px;
  padding:14px;
  border-radius:14px;
  position:relative;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* MENU BUTTON */
.menu {
  position:absolute;
  top:10px;
  right:10px;
}

.menu button {
  width:36px;
  height:36px;
  border:none;
  border-radius:50%;
  background:#0f172a;
  color:white;
  font-size:18px;
}

/* FARE */
.fare {
  background:#0f172a;
  color:white;
  padding:6px 10px;
  border-radius:10px;
  font-weight:bold;
  display:inline-block;
  margin-top:5px;
}

/* ACTIONS */
.actions {
  display:flex;
  gap:6px;
  margin-top:10px;
  flex-wrap:wrap;
}

.actions button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.accept { background:green; color:white; }
.reject { background:red; color:white; }
.done { background:#0ea5e9; color:white; }
.secondary { background:#ddd; }

/* MOBILE */
@media(max-width:600px){
  .actions { flex-direction:column; }
}
</style>
</head>

<body>

<div class="top">
  <h2>🚕 BD Taxi Dashboard</h2>
  <div class="stats">
    💰 £<span id="earn">0</span> |
    📦 <span id="count">0</span>
  </div>
</div>

<div class="tabs">
  <button onclick="setTab('new')" id="tab-new" class="active">New</button>
  <button onclick="setTab('accepted')" id="tab-accepted">Accepted</button>
  <button onclick="setTab('future')" id="tab-future">Future</button>
  <button onclick="setTab('done')" id="tab-done">Done</button>
  <button onclick="setTab('history')" id="tab-history">History</button>
</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let tab = "new";
let all = [];

function setTab(t){
  tab = t;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  render();
}

function isFuture(d){
  return new Date(d.date+"T"+(d.time||"00:00")) > new Date();
}

function inLast30(d){
  const diff = (new Date() - new Date(d.date+"T"+(d.time||"00:00")))/(1000*60*60*24);
  return diff <= 30 && diff >= 0;
}

function match(d){
  const s = d.status || "new";

  if(tab==="new") return s==="new";
  if(tab==="accepted") return s==="accepted";
  if(tab==="done") return s==="done";
  if(tab==="future") return isFuture(d);
  if(tab==="history") return inLast30(d);

  return true;
}

function render(){
  const container = document.getElementById("list");
  container.innerHTML = "";

  let total = 0;
  let count = 0;

  all.forEach(({id,d})=>{
    if(!match(d)) return;

    count++;

    if(d.fare && d.status==="done"){
      total += parseFloat(d.fare) || 0;
    }

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <div class="menu">
        <button onclick="del('${id}')">⋯</button>
      </div>

      <b>${d.name||"No Name"}</b><br>
      📍 ${d.pickup||"-"} → ${d.dropoff||"-"}<br>
      🕒 ${d.date||"-"} ${d.time||""}

      <div class="fare">£${d.fare||"-"}</div>

      <div class="actions">
        ${d.status==="new" ? `<button class="accept" onclick="accept('${id}', '${d.phone}', '${d.name}')">Accept</button>` : ""}
        ${d.status==="accepted" ? `<button class="done" onclick="status('${id}','done')">Complete</button>` : ""}
        <button class="reject" onclick="status('${id}','rejected')">Reject</button>
        ${tab==="history" ? `<button class="secondary" onclick="del('${id}')">Delete</button>` : ""}
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("earn").innerText = total;
  document.getElementById("count").innerText = count;
}

function status(id,s){
  db.collection("bookings").doc(id).update({status:s});
}

function accept(id,phone,name){
  status(id,"accepted");
  whatsapp(phone,name);
}

function del(id){
  if(confirm("Delete?")){
    db.collection("bookings").doc(id).delete();
  }
}

/* WhatsApp auto */
function whatsapp(phone,name){
  if(!phone) return;

  if(phone.startsWith("0")){
    phone="44"+phone.substring(1);
  }

  const msg = encodeURIComponent(
`Hi ${name||""} 👋

Your taxi is confirmed ✅

🚕 BD Taxi St Austell`
  );

  window.open("https://wa.me/"+phone+"?text="+msg);
}

/* LOAD */
db.collection("bookings").onSnapshot(snap=>{
  all = [];
  snap.forEach(doc=>{
    all.push({id:doc.id, d:doc.data()});
  });
  render();
});
</script>

</body>
</html>
