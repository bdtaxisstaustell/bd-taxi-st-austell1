<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f7; }

h1 { text-align:center; padding:10px; }

/* TOP BAR */
.top-bar {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* TABS */
.tabs {
  display:flex;
  gap:5px;
  padding:10px;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.active { background:#25D366; color:white; }

/* BOOKING CARD */
.booking {
  background:white;
  margin:10px;
  padding:12px;
  border-radius:10px;
  line-height:1.5;

  position:relative;
  overflow:visible; /* FIX */
}

.today { border-left:6px solid orange; }

/* TAGS */
.tag {
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
  margin-bottom:6px;
}

.whatsapp { background:#25D366; color:white; }
.email { background:#007BFF; color:white; }
.web { background:#666; color:white; }

.section { margin-top:5px; font-size:14px; }

/* BUTTONS */
.btn-group {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.btn-group button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.accept { background:green; color:white; }
.reject { background:red; color:white; }
.call { background:#222; color:white; }

/* MENU */
.menu-wrap { position:relative; }

.menu-btn {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.menu-panel {
  position:absolute;
  right:0;
  top:calc(100% + 6px);
  min-width:200px;
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  display:none;
  z-index:9999; /* FIX */
}

.menu-panel.open { display:block; }

.menu-item {
  display:block;
  width:100%;
  padding:10px;
  border:none;
  background:white;
  text-align:left;
  cursor:pointer;
}

.menu-item:hover { background:#f2f2f2; }

/* MOBILE FIX */
@media (max-width:720px){
  .menu-panel{
    left:0;
    right:0;
    width:100%;
    top:50px;
  }
}

</style>
</head>

<body>

<script>
if (localStorage.getItem("adminLoggedIn") !== "true") {
  window.location.href = "admin.html";
}
</script>

<h1>🚕 BD Taxi Dashboard</h1>

<div class="top-bar">
  <div>
    💰 £<span id="todayEarnings">0</span> |
    📦 <span id="totalBookings">0</span>
  </div>

  <div>
    <button onclick="toggleNotifications()">🔔 Alerts</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="tabs">
  <button onclick="setTab('new')" class="active" id="tab-new">New</button>
  <button onclick="setTab('future')" id="tab-future">Future</button>
  <button onclick="setTab('done')" id="tab-done">Completed</button>
</div>

<div id="bookings"></div>

<audio id="sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
  storageBucket: "taxi-bookings-69cff.appspot.com",
  messagingSenderId: "1074073110832",
  appId: "1:1074073110832:web:7abfe2772b46245187a0f5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentTab = "new";
let unsubscribe = null;
let isInitialLoad = true;
let notificationsOn = true;

/* TAB SWITCH */
function setTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  loadBookings();
}

/* NOTIFICATIONS */
function toggleNotifications(){
  notificationsOn = !notificationsOn;
  alert("Notifications " + (notificationsOn ? "ON" : "OFF"));
}

function notify(){
  if(!notificationsOn) return;

  document.getElementById("sound").play().catch(()=>{});
}

/* MENU */
function toggleMenu(id){
  document.querySelectorAll(".menu-panel").forEach(m=>m.classList.remove("open"));
  document.getElementById("menu-"+id).classList.toggle("open");
}

document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu-wrap")){
    document.querySelectorAll(".menu-panel").forEach(m=>m.classList.remove("open"));
  }
});

/* MAIN LOAD */
function loadBookings(){

  if(unsubscribe){ unsubscribe(); }

  unsubscribe = db.collection("bookings")
    .orderBy("createdAt","desc")
    .onSnapshot(snapshot=>{

      const today = new Date().toISOString().split("T")[0];

      let total = 0;
      let count = 0;

      const container = document.getElementById("bookings");
      container.innerHTML="";

      snapshot.docChanges().forEach(change => {
        if(change.type === "added" && !isInitialLoad){
          notify();
        }
      });

      snapshot.forEach(doc => {

        const data = doc.data();
        const id = doc.id;

        const isToday = data.date === today;

        let bookingTime = data.date && data.time ? new Date(data.date+"T"+data.time) : null;
        const isFuture = bookingTime ? bookingTime > new Date() : false;

        let show = false;
        if(currentTab==="new" && data.status!=="done") show = true;
        if(currentTab==="future" && isFuture) show = true;
        if(currentTab==="done" && data.status==="done") show = true;
        if(!show) return;

        count++;

        if(isToday && data.fare){
          total += parseInt((data.fare||"").replace(/[^\d]/g,"")) || 0;
        }

        let sourceTag =
          data.source==="whatsapp" ? `<span class="tag whatsapp">WhatsApp</span>` :
          data.source==="email" ? `<span class="tag email">Email</span>` :
          `<span class="tag web">Web</span>`;

        const div = document.createElement("div");
        div.className = "booking "+(isToday?"today":"");

        div.innerHTML = `
          ${sourceTag}
          <b>${data.name || "No Name"}</b>

          <div class="section">
            ${data.phone ? "📞 "+data.phone : ""}
            ${data.phone ? `<button class="call" onclick="window.location.href='tel:${data.phone}'">Call</button>` : ""}
          </div>

          <div class="section">${data.email ? "📧 "+data.email : ""}</div>
          <div class="section">📍 ${data.pickup||"-"} → ${data.dropoff||"-"}</div>
          <div class="section">🕒 ${data.date||"-"} ${data.time||""}</div>

          <div class="btn-group">
            <button class="accept" onclick="accept('${id}')">Accept</button>
            <button class="reject" onclick="updateStatus('${id}','rejected')">Reject</button>

            <div class="menu-wrap">
              <button class="menu-btn" onclick="toggleMenu('${id}')">⋯</button>

              <div class="menu-panel" id="menu-${id}">
                <button class="menu-item" onclick="deleteBooking('${id}')">🗑 Delete</button>
                <button class="menu-item" onclick="shareLocation('${id}')">📍 Share Location</button>
              </div>
            </div>
          </div>
        `;

        container.appendChild(div);
      });

      document.getElementById("todayEarnings").innerText = total;
      document.getElementById("totalBookings").innerText = count;

      isInitialLoad = false;
    });
}

/* ACTIONS */
function accept(id){
  db.collection("bookings").doc(id).update({ status:"done" });
}

function updateStatus(id,status){
  db.collection("bookings").doc(id).update({ status });
}

function deleteBooking(id){
  if(confirm("Delete?")){
    db.collection("bookings").doc(id).delete();
  }
}

function shareLocation(id){
  navigator.geolocation.getCurrentPosition(pos=>{
    db.collection("bookings").doc(id).update({
      driverLat: pos.coords.latitude,
      driverLng: pos.coords.longitude
    });
    alert("Location sent");
  });
}

function logout(){
  localStorage.removeItem("adminLoggedIn");
  window.location.href="admin.html";
}

loadBookings();
</script>

</body>
</html>
