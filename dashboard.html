<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

h1 {
  margin-bottom:20px;
}

.table-section {
  margin-bottom:40px;
}

.table-section h2 {
  margin:10px 0;
}

.table-wrap {
  overflow-x:auto;
  background:#fff;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

table {
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}

thead {
  background:#0f172a;
  color:white;
}

th, td {
  padding:10px;
  border-bottom:1px solid #e2e8f0;
  font-size:14px;
}

tr:hover {
  background:#f8fafc;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  margin-right:4px;
}

.accept { background:#16a34a; color:white; }
.complete { background:#0ea5e9; color:white; }
.reject { background:#dc2626; color:white; }
.secondary { background:#64748b; color:white; }

.empty {
  padding:20px;
  background:white;
  border-radius:10px;
  text-align:center;
  color:#666;
}
</style>
</head>

<body>

<h1>🚕 BD Taxi Dashboard</h1>

<div id="bookings"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyB3j9VvJK0ELt1ILjSvNjpoy2AZMS8Sr2Q",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allBookings = [];

function todayYMD() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}

function normaliseStatus(s) {
  s = (s || "").toLowerCase();
  if (["done","completed"].includes(s)) return "done";
  if (["accepted"].includes(s)) return "accepted";
  if (["rejected","cancelled"].includes(s)) return "rejected";
  return "new";
}

function formatMoney(v) {
  return "£" + Number(v || 0).toFixed(2);
}

function groupBookings() {
  const today = todayYMD();

  const groups = {
    today: [],
    future: [],
    rejected: [],
    done: []
  };

  allBookings.forEach(item => {
    const d = item.data;
    const status = normaliseStatus(d.status);

    if (status === "rejected") {
      groups.rejected.push(item);
    } else if (status === "done") {
      groups.done.push(item);
    } else if (d.date === today) {
      groups.today.push(item);
    } else {
      groups.future.push(item);
    }
  });

  return groups;
}

function renderBookings() {
  const g = groupBookings();

  document.getElementById("bookings").innerHTML =
    renderTable("📅 Today's Bookings", g.today) +
    renderTable("⏳ Future Bookings", g.future) +
    renderTable("⛔ Cancelled", g.rejected) +
    renderTable("📊 History", g.done);
}

function renderTable(title, list) {
  if (!list.length) {
    return `<div class="table-section"><h2>${title}</h2><div class="empty">No bookings</div></div>`;
  }

  return `
  <div class="table-section">
    <h2>${title}</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Type</th>
            <th>Email</th>
            <th>Pickup</th>
            <th>Destination</th>
            <th>Fare</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          ${list.map(renderRow).join("")}
        </tbody>
      </table>
    </div>
  </div>
  `;
}

function renderRow(item) {
  const { id, data } = item;
  const status = normaliseStatus(data.status);

  const type =
    data.source === "whatsapp" ? "WhatsApp" :
    data.source === "email" ? "Email" : "Web";

  return `
  <tr>
    <td>${data.date || ""} ${data.time || ""}</td>
    <td>${data.name || ""}</td>
    <td>${data.phone || "-"}</td>
    <td>${type}</td>
    <td>${data.email || "-"}</td>
    <td>${data.pickup || "-"}</td>
    <td>${data.dropoff || "-"}</td>
    <td>${data.fare ? formatMoney(data.fare) : "-"}</td>

    <td>${renderActions(id, status)}</td>
  </tr>
  `;
}

function renderActions(id, status) {
 let buttons = `
  <button class="secondary" onclick="editBooking('${id}')">Edit</button>
  <button class="reject" onclick="deleteBooking('${id}')">Delete</button>
`;

if (status === "new") {
  buttons += `
    <button class="accept" onclick="acceptBooking('${id}')">Accept</button>
    <button class="reject" onclick="updateStatus('${id}','rejected')">Reject</button>
  `;
}

if (status === "accepted") {
  buttons += `
    <button class="complete" onclick="updateStatus('${id}','done')">Complete</button>
    <button class="reject" onclick="updateStatus('${id}','rejected')">Cancel</button>
  `;
}

if (status === "done") {
  buttons += `
    <button class="secondary" onclick="updateStatus('${id}','accepted')">Reopen</button>
  `;
}

if (status === "rejected") {
  buttons += `
    <button class="secondary" onclick="updateStatus('${id}','new')">Restore</button>
  `;
}

return buttons;
}

function updateStatus(id, status) {
  db.collection("bookings").doc(id).update({
    status: status
  });
}

function acceptBooking(id) {
  db.collection("bookings").doc(id).update({
    status: "accepted"
  });
}
function deleteBooking(id) {
  if (confirm("Are you sure you want to delete this booking?")) {
    db.collection("bookings").doc(id).delete();
  }
}

function editBooking(id) {
  const newName = prompt("Enter new name:");
  if (newName === null) return;

  const newPhone = prompt("Enter new phone:");
  const newFare = prompt("Enter new fare:");

  db.collection("bookings").doc(id).update({
    name: newName,
    phone: newPhone,
    fare: newFare
  });
}
  function deleteBooking(id) {
  if (confirm("Delete this booking?")) {
    db.collection("bookings").doc(id).delete();
  }
}

function editBooking(id) {
  const newName = prompt("New name:");
  if (newName === null) return;

  const newPhone = prompt("New phone:");
  if (newPhone === null) return;

  const newFare = prompt("New fare:");
  if (newFare === null) return;

  db.collection("bookings").doc(id).update({
    name: newName,
    phone: newPhone,
    fare: newFare
  });
}
db.collection("bookings").onSnapshot(snapshot => {
  allBookings = [];

  snapshot.forEach(doc => {
    allBookings.push({
      id: doc.id,
      data: doc.data()
    });
  });

  renderBookings();
});
</script>

</body>
</html>
