  window.location.href = "admin.html";

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Taxi St Austell Dashboard</title>

<style>
body { font-family: Arial; padding: 14px; background:#eef2f7; margin:0; }
h1 { text-align:center; }

.top-bar {
  display:flex; justify-content:space-between;
  margin-bottom:20px;
}

.booking {
  background:white;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
}

.today {
  background:#fff8d6;
  border-left:6px solid orange;
}

.row {
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
  padding:4px 0;
}

.btn-group {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.btn-group button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.accept { background:green; color:white; }
.reject { background:red; color:white; }
.driver { background:#007bff; color:white; }

</style>
</head>

<body>

<h1>🚕 Bd Taxi St Austell Dashboard</h1>

<div class="top-bar">
  <div>
    💰 Today £<span id="todayEarnings">0</span> |
    📦 <span id="totalBookings">0</span>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<div id="bookings"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "taxi-bookings-69cff.firebaseapp.com",
  projectId: "taxi-bookings-69cff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔔 SIMPLE NOTIFICATION */
function notify(title, body){
  if(Notification.permission === "granted"){
    new Notification(title,{ body });
  } else {
    Notification.requestPermission();
  }
}

/* 📍 DRIVER LOCATION */
function shareLocation(id){
  navigator.geolocation.getCurrentPosition(pos=>{
    db.collection("bookings").doc(id).update({
      driverLat: pos.coords.latitude,
      driverLng: pos.coords.longitude
    });
    alert("Location sent");
  });
}

/* TIME CALC */
function getTimeDiff(date,time){
  const now = new Date();
  const b = new Date(date+"T"+time);
  const diff = (b-now)/60000;

  if(diff < 0) return "Started";
  if(diff < 60) return "in "+Math.round(diff)+" mins";
  return "in "+Math.floor(diff/60)+" hrs";
}

function loadBookings(){

  db.collection("bookings").onSnapshot(snapshot=>{

    const today = new Date().toISOString().split("T")[0];
    let todayTotal = 0;
    let count = 0;

    const list = [];

    snapshot.forEach(doc=>{
      list.push({ id:doc.id, ...doc.data() });
    });

    // SORT
    list.sort((a,b)=>{
      if(a.date===today && b.date!==today) return -1;
      if(a.date!==today && b.date===today) return 1;
      if(a.date!==b.date) return a.date.localeCompare(b.date);
      return (a.time||"").localeCompare(b.time||"");
    });

    const container = document.getElementById("bookings");
    container.innerHTML="";

    list.forEach(data=>{

      count++;

      if(data.date===today && data.fareAmount){
        todayTotal += Number(data.fareAmount);
      }

      const div = document.createElement("div");
      div.className = "booking "+(data.date===today?"today":"");

      div.innerHTML = `
        <b>${data.name}</b>
        <div>${getTimeDiff(data.date,data.time)}</div>

        <div class="row"><span>Route</span><span>${data.pickup} → ${data.dropoff}</span></div>
        <div class="row"><span>Date</span><span>${data.date} ${data.time}</span></div>
        <div class="row"><span>Passengers</span><span>${data.passengers}</span></div>

        <div class="btn-group">
          <button class="accept" onclick="updateStatus('${data.id}','accepted')">Accept</button>
          <button class="reject" onclick="updateStatus('${data.id}','rejected')">Reject</button>
          <button onclick="deleteBooking('${data.id}')">Delete</button>
          <button onclick="replyWhatsApp('${data.phone}','${data.name}')">WhatsApp</button>
          <button class="driver" onclick="assignDriver('${data.id}')">Assign</button>
          <button onclick="shareLocation('${data.id}')">📍 Location</button>
        </div>
      `;

      container.appendChild(div);
    });

    document.getElementById("todayEarnings").innerText = todayTotal;
    document.getElementById("totalBookings").innerText = count;

    // 🔔 notify new booking
    if(!window.firstLoaded){
      window.firstLoaded = true;
    } else {
      notify("New Booking 🚕","Check dashboard");
    }

  });
}

/* FUNCTIONS */
function assignDriver(id){
  const name = prompt("Driver name?");
  if(!name) return;
  db.collection("bookings").doc(id).update({ driver:name });
}

function updateStatus(id,status){
  db.collection("bookings").doc(id).update({ status });
}

function deleteBooking(id){
  if(confirm("Delete?")){
    db.collection("bookings").doc(id).delete();
  }
}

function replyWhatsApp(phone,name){
  if(!phone) return alert("No phone");

  if(phone.startsWith("0")){
    phone="44"+phone.substring(1);
  }

  window.open("https://wa.me/"+phone);
}

function logout(){
  localStorage.removeItem("adminLoggedIn");
  window.location.href="admin.html";
}

loadBookings();
</script>

</body>
</html>
